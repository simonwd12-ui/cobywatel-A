<!doctype html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Panel Admina — CObywatel</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: Arial, sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: flex-start; min-height: 100vh; padding: 20px; }
    .login-box { background: white; padding: 40px; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); width: 340px; margin: auto; }
    h2 { text-align: center; margin-bottom: 24px; color: #1a1a2e; }
    input[type="password"], input[type="text"], textarea { width: 100%; padding: 12px 16px; border: 1px solid #ddd; border-radius: 8px; font-size: 15px; margin-bottom: 10px; font-family: Arial, sans-serif; }
    textarea { resize: none; height: 60px; }
    button { width: 100%; padding: 12px; background: #1a56db; color: white; border: none; border-radius: 8px; font-size: 15px; cursor: pointer; font-weight: bold; }
    button:hover { background: #1446c0; }
    .panel { display: none; width: 620px; max-width: 100%; }
    .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
    .logout-btn { background: none; border: 1px solid #dc3545; color: #dc3545; border-radius: 8px; padding: 6px 14px; cursor: pointer; font-size: 13px; width: auto; }
    .logout-btn:hover { background: #dc3545; color: white; }
    .stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 16px; }
    .stat-box { background: white; border-radius: 12px; padding: 14px; text-align: center; box-shadow: 0 2px 8px rgba(0,0,0,0.07); }
    .stat-number { font-size: 26px; font-weight: bold; color: #1a1a2e; }
    .stat-label { font-size: 11px; color: #888; margin-top: 4px; }
    .gen-box { background: white; border-radius: 12px; padding: 16px; margin-bottom: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.07); }
    .gen-box h4 { margin-bottom: 12px; color: #1a1a2e; font-size: 15px; }
    .gen-row { display: flex; gap: 8px; flex-wrap: wrap; }
    .type-btn { flex: 1; padding: 10px; border-radius: 8px; border: 2px solid #ddd; background: white; color: #444; font-size: 13px; cursor: pointer; font-weight: bold; transition: all 0.2s; width: auto; }
    .type-btn.selected { border-color: #1a56db; background: #e8f0fe; color: #1a56db; }
    .gen-btn { background: #1a56db; color: white; border: none; border-radius: 8px; padding: 11px 20px; cursor: pointer; font-weight: bold; font-size: 14px; width: auto; white-space: nowrap; }
    .success-msg { color: #28a745; font-size: 13px; margin-top: 8px; }
    .error-msg { color: red; font-size: 13px; margin-top: 8px; text-align: center; }
    .maintenance-box { background: white; border-radius: 12px; padding: 16px; margin-bottom: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.07); display: flex; justify-content: space-between; align-items: center; }
    .maintenance-box h4 { color: #1a1a2e; font-size: 15px; margin-bottom: 4px; }
    .maintenance-box p { font-size: 12px; color: #888; }
    .toggle-switch { position: relative; width: 52px; height: 28px; flex-shrink: 0; }
    .toggle-switch input { opacity: 0; width: 0; height: 0; }
    .toggle-slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background: #ccc; border-radius: 28px; transition: 0.3s; }
    .toggle-slider:before { content: ""; position: absolute; height: 20px; width: 20px; left: 4px; bottom: 4px; background: white; border-radius: 50%; transition: 0.3s; }
    input:checked + .toggle-slider { background: #1a56db; }
    input:checked + .toggle-slider:before { transform: translateX(24px); }
    .notes-box { background: white; border-radius: 12px; padding: 16px; margin-bottom: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.07); }
    .notes-box h4 { color: #1a1a2e; font-size: 15px; margin-bottom: 10px; }
    .notes-area { width: 100%; border: 1px solid #ddd; border-radius: 8px; padding: 10px; font-size: 14px; font-family: Arial, sans-serif; resize: vertical; min-height: 80px; margin-bottom: 8px; }
    .save-notes-btn { background: #28a745; color: white; border: none; border-radius: 8px; padding: 8px 16px; cursor: pointer; font-size: 14px; width: auto; font-weight: bold; }
    .keys-list { max-height: 450px; overflow-y: auto; }
    .key-box { background: white; border-radius: 12px; padding: 14px 16px; margin-bottom: 10px; box-shadow: 0 2px 8px rgba(0,0,0,0.07); }
    .key-row { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 6px; }
    .key-text { font-size: 17px; font-weight: bold; color: #1a1a2e; letter-spacing: 2px; }
    .key-user { font-size: 13px; color: #1a56db; font-weight: bold; margin-top: 3px; }
    .key-note { font-size: 12px; color: #666; margin-top: 2px; font-style: italic; }
    .key-meta { font-size: 11px; color: #aaa; margin-top: 2px; }
    .key-status { font-size: 11px; padding: 3px 9px; border-radius: 20px; font-weight: bold; white-space: nowrap; }
    .status-active { background: #d4edda; color: #155724; }
    .status-used { background: #fff3cd; color: #856404; }
    .status-kicked { background: #f8d7da; color: #721c24; }
    .status-expired { background: #e2e3e5; color: #495057; }
    .status-online { background: #cce5ff; color: #004085; }
    .btn-group { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 8px; }
    .btn-sm { border: none; border-radius: 6px; padding: 5px 10px; cursor: pointer; font-size: 12px; width: auto; color: white; font-weight: bold; }
    .btn-copy { background: #6c757d; }
    .btn-kick { background: #fd7e14; }
    .btn-restore { background: #28a745; }
    .btn-delete { background: #dc3545; }
    .online-dot { width: 8px; height: 8px; background: #28a745; border-radius: 50%; display: inline-block; margin-right: 4px; animation: pulse 1.5s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
    .section-title { font-size: 12px; font-weight: bold; color: #888; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 10px; margin-top: 4px; }
    h3 { color: #1a1a2e; font-size: 18px; }
    .log-box { background: white; border-radius: 12px; padding: 16px; margin-bottom: 12px; box-shadow: 0 2px 8px rgba(0,0,0,0.07); }
    .log-box h4 { color: #1a1a2e; font-size: 15px; margin-bottom: 10px; }
    .log-item { padding: 8px 0; border-bottom: 1px solid #f0f0f0; font-size: 13px; color: #444; }
    .log-item:last-child { border-bottom: none; }
    .log-time { font-size: 11px; color: #aaa; }
  </style>
</head>
<body>

<div id="loginScreen" class="login-box">
  <h2>🔐 Panel Admina</h2>
  <input type="password" id="adminPassword" placeholder="Hasło admina" />
  <button onclick="login()">Zaloguj się</button>
  <p class="error-msg" id="loginError"></p>
</div>

<div id="adminPanel" class="login-box panel">
  <div class="top-bar">
    <h3>⚙️ Panel Admina</h3>
    <button class="logout-btn" onclick="logout()">Wyloguj</button>
  </div>

  <div class="stats-grid">
    <div class="stat-box">
      <div class="stat-number" id="statTotal">0</div>
      <div class="stat-label">Wszystkie</div>
    </div>
    <div class="stat-box">
      <div class="stat-number" style="color:#28a745" id="statActive">0</div>
      <div class="stat-label">Aktywne</div>
    </div>
    <div class="stat-box">
      <div class="stat-number" style="color:#856404" id="statUsed">0</div>
      <div class="stat-label">Używane</div>
    </div>
    <div class="stat-box">
      <div class="stat-number" style="color:#004085" id="statOnline">0</div>
      <div class="stat-label"><span class="online-dot"></span>Online</div>
    </div>
  </div>

  <div class="maintenance-box">
    <div>
      <h4>🔧 Tryb konserwacji</h4>
      <p>Użytkownicy zobaczą baner z informacją o aktualizacji</p>
    </div>
    <label class="toggle-switch">
      <input type="checkbox" id="maintenanceToggle" onchange="toggleMaintenance()">
      <span class="toggle-slider"></span>
    </label>
  </div>

  <div class="notes-box">
    <h4>📝 Moje notatki</h4>
    <textarea class="notes-area" id="adminNotes" placeholder="Twoje prywatne notatki..."></textarea>
    <button class="save-notes-btn" onclick="saveNotes()">💾 Zapisz notatki</button>
    <p class="success-msg" id="notesSuccess"></p>
  </div>

  <div class="gen-box">
    <h4>🗝️ Generuj nowy klucz</h4>
    <div class="gen-row">
      <button class="type-btn selected" id="btn-forever" onclick="selectType('forever')">♾️ Na zawsze</button>
      <button class="type-btn" id="btn-month" onclick="selectType('month')">📅 1 miesiąc</button>
      <button class="type-btn" id="btn-day" onclick="selectType('day')">⏰ 1 dzień</button>
    </div>
    <textarea id="keyNote" placeholder="Notatka (opcjonalne)" style="margin-top:10px;"></textarea>
    <div class="gen-row">
      <button class="gen-btn" onclick="generateKey()">+ Generuj klucz</button>
    </div>
    <p class="success-msg" id="genSuccess"></p>
  </div>

  <div class="log-box">
    <h4>📋 Historia logowań</h4>
    <div id="loginLog"><p style="color:#aaa;font-size:13px;">Ładowanie...</p></div>
  </div>

  <p class="section-title">Klucze dostępu</p>
  <div class="keys-list" id="keysList">
    <p style="color:#888;text-align:center;margin-top:16px;">Ładowanie...</p>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, updateDoc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBmk6wS524JWhphQ60yK8kbzO6CnoVzyRw",
    authDomain: "cobywatel-keys.firebaseapp.com",
    projectId: "cobywatel-keys",
    storageBucket: "cobywatel-keys.firebasestorage.app",
    messagingSenderId: "872471814880",
    appId: "1:872471814880:web:4bd0fb7d3ffba583b2e685"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const ADMIN_PASSWORD = "simon2025";
  let selectedType = 'forever';

  window.login = function() {
    const pass = document.getElementById('adminPassword').value;
    if (pass === ADMIN_PASSWORD) {
      document.getElementById('loginScreen').style.display = 'none';
      document.getElementById('adminPanel').style.display = 'block';
      loadAll();
      setInterval(loadAll, 15000);
    } else {
      document.getElementById('loginError').innerText = 'Złe hasło!';
    }
  }

  window.logout = function() {
    document.getElementById('loginScreen').style.display = 'flex';
    document.getElementById('adminPanel').style.display = 'none';
    document.getElementById('adminPassword').value = '';
  }

  async function loadAll() {
    await loadKeys();
    await loadSettings();
    loadNotes();
  }

  window.toggleMaintenance = async function() {
    const enabled = document.getElementById('maintenanceToggle').checked;
    await setDoc(doc(db, 'settings', 'maintenance'), { enabled });
  }

  async function loadSettings() {
    try {
      const maintenanceDoc = await getDoc(doc(db, 'settings', 'maintenance'));
      if (maintenanceDoc.exists()) {
        document.getElementById('maintenanceToggle').checked = maintenanceDoc.data().enabled === true;
      }
    } catch(e) { console.log('settings error:', e); }
  }

  function loadNotes() {
    const saved = localStorage.getItem('adminNotes');
    if (saved) document.getElementById('adminNotes').value = saved;
  }

  window.saveNotes = function() {
    localStorage.setItem('adminNotes', document.getElementById('adminNotes').value);
    document.getElementById('notesSuccess').innerText = '✅ Zapisano!';
    setTimeout(() => { document.getElementById('notesSuccess').innerText = ''; }, 2000);
  }

  window.selectType = function(type) {
    selectedType = type;
    document.querySelectorAll('.type-btn').forEach(b => b.classList.remove('selected'));
    document.getElementById('btn-' + type).classList.add('selected');
  }

  function randomKey() {
    const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
    let key = '';
    for (let i = 0; i < 4; i++) {
      if (i > 0) key += '-';
      for (let j = 0; j < 4; j++) key += chars[Math.floor(Math.random() * chars.length)];
    }
    return key;
  }

  window.generateKey = async function() {
    const key = randomKey();
    const note = document.getElementById('keyNote').value.trim();
    const now = new Date();
    let expiresAt = null;
    if (selectedType === 'day') expiresAt = new Date(now.getTime() + 86400000).toISOString();
    else if (selectedType === 'month') {
      const exp = new Date(now);
      exp.setMonth(exp.getMonth() + 1);
      expiresAt = exp.toISOString();
    }
    await addDoc(collection(db, 'keys'), {
      key, used: false, kicked: false,
      note: note || null, type: selectedType,
      expiresAt, createdAt: now.toISOString(),
      lastSeen: null, userName: null
    });
    const typeLabel = selectedType === 'forever' ? 'na zawsze' : selectedType === 'month' ? '1 miesiąc' : '1 dzień';
    document.getElementById('genSuccess').innerText = `✅ Klucz ${key} (${typeLabel}) wygenerowany!`;
    document.getElementById('keyNote').value = '';
    setTimeout(() => { document.getElementById('genSuccess').innerText = ''; }, 4000);
    loadKeys();
  }

  window.deleteKey = async function(id) {
    if (confirm('Czy na pewno chcesz usunąć ten klucz?')) {
      await deleteDoc(doc(db, 'keys', id));
      loadKeys();
    }
  }

  window.copyKey = function(key) {
    navigator.clipboard.writeText(key);
    alert('Skopiowano: ' + key);
  }

  window.kickUser = async function(id) {
    if (confirm('Czy na pewno chcesz wylogować tego użytkownika?')) {
      await updateDoc(doc(db, 'keys', id), { kicked: true });
      loadKeys();
    }
  }

  window.restoreUser = async function(id) {
    await updateDoc(doc(db, 'keys', id), { kicked: false });
    loadKeys();
  }

  function isExpired(data) {
    if (!data.expiresAt) return false;
    return new Date() > new Date(data.expiresAt);
  }

  function isOnline(data) {
    if (!data.lastSeen) return false;
    return (new Date() - new Date(data.lastSeen)) < 20000;
  }

  function formatDate(iso) {
    if (!iso) return '—';
    return new Date(iso).toLocaleString('pl-PL');
  }

  window.loadKeys = async function() {
    const list = document.getElementById('keysList');
    const logDiv = document.getElementById('loginLog');
    const snapshot = await getDocs(collection(db, 'keys'));

    if (snapshot.empty) {
      list.innerHTML = '<p style="color:#888;text-align:center;">Brak kluczy</p>';
      logDiv.innerHTML = '<p style="color:#aaa;font-size:13px;">Brak historii</p>';
      ['statTotal','statActive','statUsed','statOnline'].forEach(id => document.getElementById(id).innerText = 0);
      return;
    }

    const docs = [];
    snapshot.forEach(d => docs.push({ id: d.id, ...d.data() }));
    docs.sort((a, b) => new Date(b.createdAt) - new Date(a.createdAt));

    let total = docs.length, active = 0, used = 0, online = 0;
    docs.forEach(d => {
      if (isOnline(d)) online++;
      if (!d.used && !isExpired(d) && !d.kicked) active++;
      if (d.used && !d.kicked && !isExpired(d)) used++;
    });
    document.getElementById('statTotal').innerText = total;
    document.getElementById('statActive').innerText = active;
    document.getElementById('statUsed').innerText = used;
    document.getElementById('statOnline').innerText = online;

    const allLogs = [];
    docs.forEach(d => {
      if (d.used && d.updatedAt) {
        allLogs.push({ time: d.updatedAt, key: d.key, userName: d.userName });
      }
    });
    allLogs.sort((a, b) => new Date(b.time) - new Date(a.time));
    logDiv.innerHTML = allLogs.length === 0
      ? '<p style="color:#aaa;font-size:13px;">Brak historii</p>'
      : allLogs.slice(0, 10).map(log => `
          <div class="log-item">
            👤 <b>${log.userName || 'Nieznany'}</b> — klucz <b>${log.key}</b>
            <div class="log-time">${formatDate(log.time)}</div>
          </div>`).join('');

    list.innerHTML = '';
    docs.forEach(data => {
      const expired = isExpired(data);
      const online = isOnline(data);
      let statusClass = 'status-active', statusText = '🟢 Aktywny';
      if (data.kicked) { statusClass = 'status-kicked'; statusText = '🔴 Wylogowany'; }
      else if (expired) { statusClass = 'status-expired'; statusText = '⚫ Wygasły'; }
      else if (online) { statusClass = 'status-online'; statusText = '🔵 Online'; }
      else if (data.used) { statusClass = 'status-used'; statusText = '🟡 Używany'; }
      const typeLabel = data.type === 'day' ? '⏰ 1 dzień' : data.type === 'month' ? '📅 1 miesiąc' : '♾️ Na zawsze';
      const div = document.createElement('div');
      div.className = 'key-box';
      div.innerHTML = `
        <div class="key-row">
          <span class="key-text">${data.key}</span>
          <span class="key-status ${statusClass}">${statusText}</span>
        </div>
        ${data.userName ? `<div class="key-user">👤 ${data.userName}</div>` : ''}
        ${data.note ? `<div class="key-note">📝 ${data.note}</div>` : ''}
        <div class="key-meta">${typeLabel} · Utworzony: ${formatDate(data.createdAt)}</div>
        <div class="key-meta">Ostatnio online: ${formatDate(data.lastSeen)}</div>
        <div class="btn-group">
          <button class="btn-sm btn-copy" onclick="copyKey('${data.key}')">📋 Kopiuj</button>
          ${data.used && !data.kicked && !expired ? `<button class="btn-sm btn-kick" onclick="kickUser('${data.id}')">🚫 Wyloguj</button>` : ''}
          ${data.kicked ? `<button class="btn-sm btn-restore" onclick="restoreUser('${data.id}')">✅ Przywróć</button>` : ''}
          <button class="btn-sm btn-delete" onclick="deleteKey('${data.id}')">🗑️ Usuń</button>
        </div>
      `;
      list.appendChild(div);
    });
  }

  document.getElementById('adminPassword').addEventListener('keydown', e => {
    if (e.key === 'Enter') window.login();
  });
</script>

</body>
</html>
