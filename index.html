<!doctype html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Panel Admina — CObywatel</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: Arial, sans-serif; background: #f0f2f5; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
    .login-box { background: white; padding: 40px; border-radius: 16px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); width: 340px; }
    h2 { text-align: center; margin-bottom: 24px; color: #1a1a2e; }
    input { width: 100%; padding: 12px 16px; border: 1px solid #ddd; border-radius: 8px; font-size: 16px; margin-bottom: 12px; }
    button { width: 100%; padding: 12px; background: #1a56db; color: white; border: none; border-radius: 8px; font-size: 16px; cursor: pointer; font-weight: bold; }
    button:hover { background: #1446c0; }
    .panel { display: none; }
    .key-box { background: #f8f9fa; border: 1px solid #dee2e6; border-radius: 8px; padding: 16px; margin-top: 12px; display: flex; justify-content: space-between; align-items: center; }
    .key-text { font-size: 18px; font-weight: bold; color: #1a1a2e; letter-spacing: 2px; }
    .key-status { font-size: 12px; padding: 4px 10px; border-radius: 20px; font-weight: bold; }
    .key-status.active { background: #d4edda; color: #155724; }
    .key-status.used { background: #f8d7da; color: #721c24; }
    .copy-btn { background: #6c757d; color: white; border: none; border-radius: 6px; padding: 6px 12px; cursor: pointer; font-size: 13px; margin-left: 8px; }
    .delete-btn { background: #dc3545; color: white; border: none; border-radius: 6px; padding: 6px 12px; cursor: pointer; font-size: 13px; margin-left: 4px; }
    .error { color: red; font-size: 13px; margin-top: 8px; text-align: center; }
    .success { color: green; font-size: 13px; margin-top: 8px; text-align: center; }
    .keys-list { max-height: 400px; overflow-y: auto; margin-top: 16px; }
    .top-bar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    .logout-btn { background: none; border: 1px solid #dc3545; color: #dc3545; border-radius: 8px; padding: 6px 14px; cursor: pointer; font-size: 14px; width: auto; }
    .generate-btn { margin-top: 0; }
    h3 { color: #1a1a2e; }
  </style>
</head>
<body>

<!-- Ekran logowania -->
<div id="loginScreen" class="login-box">
  <h2>🔐 Panel Admina</h2>
  <input type="password" id="adminPassword" placeholder="Hasło admina" />
  <button onclick="login()">Zaloguj się</button>
  <p class="error" id="loginError"></p>
</div>

<!-- Panel admina -->
<div id="adminPanel" class="login-box panel" style="width: 500px;">
  <div class="top-bar">
    <h3>🗝️ Klucze dostępu</h3>
    <button class="logout-btn" onclick="logout()">Wyloguj</button>
  </div>
  <button class="generate-btn" onclick="generateKey()">+ Generuj nowy klucz</button>
  <p class="success" id="genSuccess"></p>
  <div class="keys-list" id="keysList">
    <p style="color:#888; text-align:center; margin-top:16px;">Ładowanie kluczy...</p>
  </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBmk6wS524JWhphQ60yK8kbzO6CnoVzyRw",
    authDomain: "cobywatel-keys.firebaseapp.com",
    projectId: "cobywatel-keys",
    storageBucket: "cobywatel-keys.firebasestorage.app",
    messagingSenderId: "872471814880",
    appId: "1:872471814880:web:4bd0fb7d3ffba583b2e685"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  // HASŁO ADMINA — zmień na swoje!
  const ADMIN_PASSWORD = "simon2025";

  window.login = function() {
    const pass = document.getElementById('adminPassword').value;
    if (pass === ADMIN_PASSWORD) {
      document.getElementById('loginScreen').style.display = 'none';
      document.getElementById('adminPanel').style.display = 'block';
      loadKeys();
    } else {
      document.getElementById('loginError').innerText = 'Złe hasło!';
    }
  }

  window.logout = function() {
    document.getElementById('loginScreen').style.display = 'flex';
    document.getElementById('adminPanel').style.display = 'none';
    document.getElementById('adminPassword').value = '';
  }

  function randomKey() {
    const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ0123456789';
    let key = '';
    for (let i = 0; i < 4; i++) {
      if (i > 0) key += '-';
      for (let j = 0; j < 4; j++) {
        key += chars[Math.floor(Math.random() * chars.length)];
      }
    }
    return key;
  }

  window.generateKey = async function() {
    const key = randomKey();
    await addDoc(collection(db, 'keys'), {
      key: key,
      used: false,
      createdAt: new Date().toISOString()
    });
    document.getElementById('genSuccess').innerText = `✅ Klucz ${key} został wygenerowany!`;
    setTimeout(() => { document.getElementById('genSuccess').innerText = ''; }, 3000);
    loadKeys();
  }

  window.deleteKey = async function(id) {
    await deleteDoc(doc(db, 'keys', id));
    loadKeys();
  }

  window.copyKey = function(key) {
    navigator.clipboard.writeText(key);
  }

  window.loadKeys = async function() {
    const list = document.getElementById('keysList');
    list.innerHTML = '';
    const snapshot = await getDocs(collection(db, 'keys'));
    if (snapshot.empty) {
      list.innerHTML = '<p style="color:#888; text-align:center; margin-top:16px;">Brak kluczy</p>';
      return;
    }
    snapshot.forEach(docSnap => {
      const data = docSnap.data();
      const div = document.createElement('div');
      div.className = 'key-box';
      div.innerHTML = `
        <span class="key-text">${data.key}</span>
        <div>
          <span class="key-status ${data.used ? 'used' : 'active'}">${data.used ? 'Użyty' : 'Aktywny'}</span>
          <button class="copy-btn" onclick="copyKey('${data.key}')">Kopiuj</button>
          <button class="delete-btn" onclick="deleteKey('${docSnap.id}')">Usuń</button>
        </div>
      `;
      list.appendChild(div);
    });
  }

  // Enter przy logowaniu
  document.getElementById('adminPassword').addEventListener('keydown', e => {
    if (e.key === 'Enter') window.login();
  });
</script>

</body>
</html>
